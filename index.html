<!doctype html>
<html lang="en-us">
<head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    <title>Sonic the Hedgehog</title>

    <link type="text/css" rel="stylesheet" href="css/fonts.css" />

    <script src="save.js"></script>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            text-align: center;
        }
        canvas {
            height: 100%;
            margin: auto;
            display: block;
            image-rendering: pixelated;
        }
        #status {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #ccc;
            font-family: Arial, sans-serif;
            font-size: 14px;
        }
    </style>
</head>

<body>
    <div id="status"></div>
    <canvas id="canvas"></canvas>

    <script>
        var statusElement = document.getElementById('status');

        var Module = {
            preRun: [],
            postRun: [],
            print: text => console.log(text),
            printErr: text => console.error(text),

            canvas: (function () {
                var canvas = document.getElementById('canvas');
                canvas.addEventListener("webglcontextlost", function (e) {
                    alert('WebGL context lost. Reload the page.');
                    e.preventDefault();
                }, false);
                return canvas;
            })(),

            setStatus: function (text) {
                statusElement.textContent = text;
            }
        };

        // ---- LOCALSTORAGE SAVE HOOKS ----
        Module.preRun.push(function () {
            if (typeof loadSave === "function") loadSave();
        });

        Module.postRun.push(function () {
            if (typeof autoSave === "function") {
                setInterval(autoSave, 5000);
            }
        });

        // ---- AUDIO UNLOCK ----
        function resumeAudio() {
            try {
                var ctx =
                    (Module && Module.SDL2 && Module.SDL2.audioContext) ||
                    Module.audioContext;

                if (ctx && ctx.state === "suspended") {
                    ctx.resume().then(() => console.log("[AUDIO] resumed"));
                }
            } catch (e) {
                console.log("[AUDIO] resume error", e);
            }
        }

        document.addEventListener("click", resumeAudio);
        document.addEventListener("keydown", resumeAudio);

        window.onerror = function () {
            Module.setStatus("Exception thrown, see console");
        };
    </script>

    <script async defer src="index.js"></script>
</body>
</html>
