<!doctype html>
<html lang="en-us">
<head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    <title>Sonic the Hedgehog</title>

    <!-- Original font CSS (keep if you have css/fonts.css) -->
    <link type="text/css" rel="stylesheet" href="css/fonts.css" />

    <!-- Optional: if you have a separate save.js, it will load here (not required) -->
    <!-- <script src="save.js"></script> -->

    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            text-align: center;
        }
        canvas {
            height: 100%;
            margin: auto;
            display: block;
            image-rendering: pixelated;
        }
        #status {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #ccc;
            font-family: Arial, sans-serif;
            font-size: 14px;
        }
        #progress {
            position: absolute;
            top: 30px;
            left: 10px;
            width: 200px;
        }
    </style>
</head>

<body>
    <div id="status"></div>
    <progress id="progress" value="0" max="100" hidden></progress>
    <canvas id="canvas"></canvas>

    <script>
        var statusElement = document.getElementById('status');
        var progressElement = document.getElementById('progress');

        var Module = {
            preRun: [],
            postRun: [],
            print: (function () {
                return function (text) {
                    console.log(text);
                };
            })(),
            printErr: function (text) {
                console.error(text);
            },
            canvas: (function () {
                var canvas = document.getElementById('canvas');
                canvas.addEventListener("webglcontextlost", function (e) {
                    alert('WebGL context lost. Reload the page.');
                    e.preventDefault();
                }, false);
                return canvas;
            })(),
            setStatus: function (text) {
                if (!text) {
                    statusElement.textContent = '';
                    progressElement.hidden = true;
                    return;
                }
                statusElement.textContent = text;
            },
            monitorRunDependencies: function (left) {
                if (left) {
                    progressElement.hidden = false;
                    progressElement.value = (this.totalDependencies - left) * 100;
                    progressElement.max = this.totalDependencies * 100;
                } else {
                    progressElement.hidden = true;
                }
            },
            totalDependencies: 0
        };

        // ---------- IDBFS MOUNT (safe persistent saves) ----------
        Module.preRun.push(function () {
            try {
                FS.mkdir('/home');
            } catch (e) {}
            try {
                FS.mkdir('/home/web_user');
            } catch (e) {}
            try {
                FS.mkdir('/home/web_user/.local');
            } catch (e) {}
            try {
                FS.mkdir('/home/web_user/.local/share');
            } catch (e) {}
            try {
                FS.mkdir('/home/web_user/.local/share/sonic1');
            } catch (e) {}

            FS.mount(IDBFS, {}, '/home/web_user/.local/share/sonic1');

            FS.syncfs(true, function (err) {
                console.log('[IDBFS] load', err);
            });
        });

        Module.postRun.push(function () {
            // Periodically sync to disk
            setInterval(function () {
                FS.syncfs(false, function (err) {
                    if (err) console.error('[IDBFS] save error', err);
                });
            }, 5000);
        });

        // ---------- AUDIO UNLOCK ----------
        function resumeAudio() {
            try {
                var ctx =
                    (Module && Module.SDL2 && Module.SDL2.audioContext) ||
                    Module.audioContext;

                if (ctx && ctx.state === 'suspended') {
                    ctx.resume().then(function () {
                        console.log('[AUDIO] Resumed');
                    });
                }
            } catch (e) {
                console.log('[AUDIO] resume error', e);
            }
        }

        document.addEventListener('click', resumeAudio);
        document.addEventListener('keydown', resumeAudio);

        window.onerror = function () {
            Module.setStatus('Exception thrown, see console');
        };
    </script>

    <!-- Game loader (this is your index.js) -->
    <script async defer src="index.js"></script>
</body>
</html>
