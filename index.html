<!doctype html>
<html lang="en-us">
<head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    <title>Sonic the Hedgehog</title>

    <link type="text/css" rel="stylesheet" href="css/fonts.css" />

    <style type="text/css">
        html, body {
            font-family: arial, sans-serif;
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            text-align: center;
        }

        canvas {
            height: 100%;
            margin: auto;
            padding: 0;
            border: 0 none;
            background-color: #000;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }

        .spinner {
            height: 30px;
            width: 30px;
            margin: 20px 0 0 20px;
            display: inline-block;
            vertical-align: top;
            animation: rotation 0.8s linear infinite;
            border-left: 5px solid rgb(235, 235, 235);
            border-right: 5px solid rgb(235, 235, 235);
            border-bottom: 5px solid rgb(235, 235, 235);
            border-top: 5px solid rgb(120, 120, 120);
            border-radius: 100%;
            background-color: rgb(189, 215, 46);
        }

        @keyframes rotation {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        #status {
            display: inline-block;
            vertical-align: top;
            margin-top: 30px;
            margin-left: 20px;
            font-weight: bold;
            color: rgb(120, 120, 120);
        }

        #progress {
            height: 20px;
            width: 300px;
        }

        #output {
            width: 100%;
            height: 200px;
            margin: 10px auto 0;
            display: none;
            background-color: black;
            color: white;
            font-family: 'Lucida Console', Monaco, monospace;
            outline: none;
        }
    </style>
</head>

<body>
    <div class="spinner" id="spinner" style="display: none;"></div>
    <div id="status" style="display: none;">Downloading...</div>
    <progress id="progress" value="0" max="100" hidden="hidden"></progress>
    <canvas id="canvas" onclick="window.focus();" oncontextmenu="event.preventDefault();"></canvas>
    <textarea id="output" rows="8"></textarea>

    <script src="save.js"></script>

    <script type="text/javascript">
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        var statusElement = document.getElementById('status');
        var progressElement = document.getElementById('progress');
        var spinnerElement = document.getElementById('spinner');

        Module.print = function(text) {
            console.log(text);
        };

        Module.printErr = function(text) {
            console.error(text);
        };

        Module.canvas = (function () {
            var canvas = document.getElementById('canvas');
            canvas.addEventListener("webglcontextlost", function (e) {
                alert('WebGL context lost. Reload the page.');
                e.preventDefault();
            }, false);
            return canvas;
        })();

        Module.setStatus = function (text) {
            if (!text) {
                spinnerElement.style.display = 'none';
                return;
            }
            statusElement.innerHTML = text;
        };

        window.onerror = function () {
            Module.setStatus('Exception thrown, see console');
            spinnerElement.style.display = 'none';
        };
    </script>

    <script async defer src="index.js"></script>
</body>
</html>
